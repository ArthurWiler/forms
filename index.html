          d: Math.min(kva, c.lim) * c.fp + Math.max(0, kva - c.lim) * c.fe,
          f: `${c.fp}/${c.fe}`,
        };
      }

        const tot = items.reduce((s, i) => s + i.q, 0),

        v == null || isNaN(v)

      // ============================================================
      // CALCULADORA DE DEMANDA (embutida) - por Unidade Consumidora
      // Recebe e atualiza o objeto de cargas de UMA unidade.
      // ============================================================
      function CalcDemanda({ data, onChange, redeMono }) {
        const d = data || {};
        const qtds = d.qtds || CAT.map(() => 0);
        const tipoA = d.tipoA || "res";
        const catA = d.catA || 0;
        const mots = d.mots || [];
        const sols = d.sols || [];
        const [busca, setBusca] = useState("");

        const upd = (patch) =>
          onChange({ ...d, qtds, tipoA, catA, mots, sols, ...patch });
        const setQ = (i, v) => {
          const n = [...qtds];
          n[i] = Math.max(0, v);
          upd({ qtds: n });
        };

        // a) iluminacao/tomadas + nao-residencial
        const rA = useMemo(() => {
          const ilItems = CAT.map((c, i) => ({ ...c, q: qtds[i] || 0 })).filter(
            (x) => x.g === "il" && x.q > 0,
          );
          const kwIl = ilItems.reduce((s, x) => s + x.q * x.w, 0) / 1000;
          if (tipoA === "res") {
            const r = calcA_res(kwIl);
            return { kw: kwIl, ...r, label: "Residencial (Tab.10)" };
          }
          const r = calcA_nr(kwIl, catA);
          return { kw: kwIl, ...r, label: TABELA_11[catA]?.d || "" };
        }, [qtds, tipoA, catA]);

        // b1..b5
        const rB = useMemo(() => {
          const out = {};
          ["b1", "b2", "b3", "b4", "b5"].forEach((sg) => {
            const items = CAT.map((c, i) => ({ ...c, q: qtds[i] || 0 })).filter(
              (x) => x.g === sg && x.q > 0,
            );
            out[sg] = calcBsg(items, sg);
          });
          return out;
        }, [qtds]);

        // c) ar-condicionado
        const rC = useMemo(() => {
          const items = CAT.map((c, i) => ({ ...c, q: qtds[i] || 0 })).filter(
            (x) => x.g === "c" && x.q > 0,
          );
          const kw = items.reduce((s, x) => s + x.q * x.w, 0) / 1000;
          return { kw, d: kw };
        }, [qtds]);

        // d) motores
        const rD = useMemo(() => {
          const det = mots.map((m) => {
            const tab = m.fase === "mono" ? T15 : T14;
            const row = tab.find((r) => r.cv === parseFloat(m.cv));
            const col = m.col || "c1";
            const corr = row ? row[col] : null;
            const kva = corr
              ? corr *
                (m.fase === "mono" ? 0.22 : 0.38) *
                Math.sqrt(m.fase === "mono" ? 1 : 3)
              : 0;
            return { ...m, kva: (m.q || 0) * (kva || 0) };
          });
          const d = det.reduce((s, x) => s + x.kva, 0);
          return { det, d };
        }, [mots]);

        // f) raios-x
        const rF = useMemo(() => {
          const items = CAT.map((c, i) => ({ ...c, q: qtds[i] || 0 })).filter(
            (x) => x.g === "f" && x.q > 0,
          );
          const kw = items.reduce((s, x) => s + x.q * x.w, 0) / 1000;
          return { kw, d: kw * 0.5 };
        }, [qtds]);

        const demandaTotal = useMemo(() => {
          const b = Object.values(rB).reduce((s, x) => s + (x.d || 0), 0);
          return rA.d + b + rC.d + rD.d + rF.d;
        }, [rA, rB, rC, rD, rF]);

        const cargaInstalada = useMemo(() => {
          const cargasCat =
            CAT.reduce((s, c, i) => s + (qtds[i] || 0) * c.w, 0) / 1000;
          const motoresKw = 0; // motores entram via demanda
          return cargasCat;
        }, [qtds]);

        const disjuntores = useMemo(
          () => selecionarDisjuntores(demandaTotal, redeMono),
          [demandaTotal, redeMono],
        );

        // expoe resultado ao pai sempre que muda

            <Field label="Atividade da Unidade" cl="mb-3">

                <Toggle

      // ============================================================
      // CLASSIFICADOR DE ATENDIMENTO
      // Decide entre: ate3 (sem disjuntor geral) | mais3 (proj BT / proteção geral)
      // ============================================================
      function classificar(c) {
        // c: { nCaixas, protecaoGeral, edificacaoAcima75, biAcima60, triAcima60, multiTri, projeto }
        const motivos = [];
        let fluxo = "ate3";
        if (c.projeto) {
          fluxo = "mais3";
          motivos.push("Aprovação de Projeto Elétrico de BT");
        }
        if (c.edificacaoAcima75) {
          fluxo = "mais3";
          motivos.push("Edificação individual acima de 75 kW em BT");
        }
        if (Number(c.nCaixas) > 3) {
          fluxo = "mais3";
          motivos.push("Agrupamento acima de 3 caixas de medição");
        }
        if (c.protecaoGeral) {
          fluxo = "mais3";
          motivos.push("Opção por instalação de proteção geral");
        }
        if (c.biAcima60) {
          fluxo = "mais3";
          motivos.push("UC bifásica acima de 60A (NEMA) / 63A (IEC)");
        }
        if (c.triAcima60) {
          fluxo = "mais3";
          motivos.push("UC trifásica acima de 60A (NEMA) / 63A (IEC)");
        }
        if (c.multiTri) {
          fluxo = "mais3";
          motivos.push("Mais de uma UC trifásica");
        }
        if (fluxo === "ate3")
          motivos.push("Agrupamento até 3 caixas sem disjuntor geral");
        return { fluxo, motivos };
      }

          disjGeralCond: "",
          disjAntes: "Não",
          demandaCond: "",
        });
        // Gerador de emergência
        const [gerador, setGerador] = useState({
          possui: "Não",
          potencia: "",
          fonte: "",
          descricao: "",
        });
        const [obs, setObs] = useState("");
        const [cepStatus, setCepStatus] = useState({ obra: "", corr: "" });

        // ===== UNIDADES CONSUMIDORAS =====
        const [ucs, setUcs] = useState([estadoInicialUC()]);
        const setUC = (i, patch) =>
          setUcs((p) =>
            p.map((u, idx) => (idx === i ? { ...u, ...patch } : u)),
          );
        const addUC = () => setUcs((p) => [...p, estadoInicialUC()]);
        const delUC = (i) => setUcs((p) => p.filter((_, idx) => idx !== i));

        const redeMono =
          obra.tipoRede === "Monofásica" || obra.tipoRede === "Bifásica";

        // ===== API PÚBLICA DE CEP (ViaCEP) =====
        const buscarCEP = async (cep, alvo) => {
          const limpo = (cep || "").replace(/\D/g, "");
          if (limpo.length !== 8) {
            setCepStatus((p) => ({ ...p, [alvo]: "" }));
            return;
          }
          setCepStatus((p) => ({ ...p, [alvo]: "buscando" }));
          try {
            const r = await fetch(`https://viacep.com.br/ws/${limpo}/json/`);
            const d = await r.json();
            if (d.erro) {
              setCepStatus((p) => ({ ...p, [alvo]: "erro" }));
              return;
            }
            if (alvo === "obra") {
              setObra((o) => ({
                ...o,
                endereco: d.logradouro || o.endereco,
                bairro: d.bairro || o.bairro,
                cidade: d.localidade || o.cidade,
                estado: d.uf || o.estado,
              }));
            } else {
              setCorr((c) => ({
                ...c,
                rua: d.logradouro || c.rua,
                bairro: d.bairro || c.bairro,
                municipio: d.localidade || c.municipio,
                estado: d.uf || c.estado,
              }));
            }
            setCepStatus((p) => ({ ...p, [alvo]: "ok" }));
          } catch (e) {
            setCepStatus((p) => ({ ...p, [alvo]: "erro" }));
          }
        };

        // ===== REGRA DE DISJUNTORES (formulário até 3 caixas) =====
        // Com mais de uma UC: no máx. 1 tripolar 63A E/OU até 2 mono/bifásicos 63A (ou combinação).
        const validacaoDisjuntores = useMemo(() => {
          if (fluxo !== "ate3" || ucs.length <= 1) return { ok: true, msg: "" };
          let tri = 0,
            monoBi = 0;
          ucs.forEach((u) => {
            const list = u.cargas?._disjuntores || [];
            // considera o disjuntor de maior porte sugerido para a UC
            const escolhido = u.disjEscolhido || list[0] || "";
            if (/Tripolar/i.test(escolhido)) tri++;
            else if (/Mono|Bipolar/i.test(escolhido)) monoBi++;
          });
          const excedeTri = tri > 1;
          const excedeMonoBi = monoBi > 2;
          // qualquer disjuntor acima de 63A inviabiliza o fluxo até 3 caixas
          const acima63 = ucs.some((u) => {
            const esc =
              u.disjEscolhido || (u.cargas?._disjuntores || [])[0] || "";
            const m = esc.match(/(\d+)\s*A/);
            return m && Number(m[1]) > 63;
          });
          if (acima63)
            return {
              ok: false,
              msg: "Há UC com disjuntor acima de 63 A. Nesse caso o atendimento exige proteção geral / projeto (mais de 3 caixas). Reclassifique o atendimento.",
            };
          if (excedeTri)
            return {
              ok: false,
              msg: `Com mais de uma UC é permitido no máximo 1 disjuntor tripolar de 63 A (atual: ${tri}).`,
            };
          if (excedeMonoBi)
            return {
              ok: false,
              msg: `Com mais de uma UC são permitidos no máximo 2 disjuntores mono/bifásicos de 63 A (atual: ${monoBi}).`,
            };
          return {
            ok: true,
            msg: `Combinação válida: ${tri} tripolar(es) 63A + ${monoBi} mono/bifásico(s) 63A.`,
          };
        }, [fluxo, ucs]);

        // Coordenada obrigatória para rural a mais de 30 m da rede
        const coordObrigatoria =
          obra.localizacao === "Rural" && obra.distMenor30 === "Não";
        const coordPreenchida = !!(
          obra.coordenada ||
          (obra.latitude && obra.longitude)
        );

        const onConfirmClass = (fx, cd, res) => {
          setFluxo(fx);
          setClassData(cd);
          setClassRes(res);
          setClassif((p) => ({ ...p, nTotalUcs: cd.nCaixas }));
          // ajusta nº de UCs conforme caixas (limita a um número gerenciável)
          const n = Math.max(
            1,
            Math.min(Number(cd.nCaixas) || 1, fx === "ate3" ? 3 : 30),
          );
          setUcs(Array.from({ length: n }, () => estadoInicialUC()));
          setEtapa("form");
          setAba("prop");
        };

        // demanda total somada
        const demandaTotalGeral = useMemo(
          () => ucs.reduce((s, u) => s + (u.cargas?._demanda || 0), 0),
          [ucs],
        );

        // abas conforme fluxo
        // Comuns a ambos: proprietário, correspondência, obra
        const abasComuns = [
          { k: "prop", l: "Proprietário" },
          { k: "corr", l: "Correspondência" },
          { k: "obra", l: "Dados da Obra" },
        ];
        // A classificação do atendimento vem APÓS a declaração de cargas (aba "ucs")
        // e é exclusiva do formulário coletivo (mais de 3 caixas).
        const abasFluxo =
          fluxo === "mais3"
            ? [
                { k: "ucs", l: "Unidades Consumidoras" },
                { k: "class", l: "Classificação" },
                { k: "disj", l: "Disjuntores Prumada" },
              ]
            : [
                { k: "ucs", l: "Cargas e UCs" },
                { k: "gerador", l: "Gerador de Emergência" },
              ];
        const abas = [
          ...abasComuns,
          ...abasFluxo,
          { k: "obs", l: "Observações" },
          { k: "revisar", l: "Revisar e PDF" },
        ];

        // ============================================================
        // GERAR PDF
        // ============================================================
        const gerarPDF = useCallback(() => {
          if (!window.jspdf) {
            alert("Biblioteca jsPDF não carregada. Verifique sua conexão.");
            return;
          }
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: "mm", format: "a4" });
          const PW = 210,
            PH = 297,
            MG = 14,
            CW = PW - 2 * MG;
          let cy = MG;

          const checkSpace = (h) => {
            if (cy + h > PH - 14) {
              addFooterNum();
              doc.addPage();
              cy = MG;
              drawTopBar();
            }
          };

          let pageNum = 0;
          const drawTopBar = () => {
            doc.setFillColor(4, 30, 24);
            doc.rect(0, 0, PW, 18, "F");
            doc.setFillColor(1, 111, 34);
            doc.rect(0, 0, 4, 18, "F");
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.setTextColor(255, 255, 255);
            doc.text("Formulário CEMIG - Orçamento de Conexão BT", MG, 8);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(7);
            doc.setTextColor(150, 200, 170);
            doc.text(
              fluxo === "mais3"
                ? "Análise de Rede / Projeto BT (mais de 3 caixas / proteção geral)"
                : "Conexão até 3 caixas (sem disjuntor geral)",
              MG,
              13.5,
            );
            cy = 24;
          };
          const addFooterNum = () => {
            pageNum++;
            doc.setFont("helvetica", "normal");
            doc.setFontSize(6.5);
            doc.setTextColor(150, 150, 150);
            doc.text(
              "Documento gerado eletronicamente - não substitui o formulário oficial CEMIG",
              MG,
              PH - 7,
            );
          };

          const sec = (txt) => {
            checkSpace(11);
            doc.setFillColor(231, 241, 239);
            doc.rect(MG, cy, CW, 7, "F");
            doc.setFillColor(1, 111, 34);
            doc.rect(MG, cy, 2.5, 7, "F");
            doc.setFont("helvetica", "bold");
            doc.setFontSize(8.5);
            doc.setTextColor(4, 30, 24);
            doc.text(txt, MG + 5, cy + 4.8);
            cy += 9;
          };
          // pares label:valor em duas colunas
          const kvPairs = (pairs) => {
            const colW = CW / 2;
            for (let i = 0; i < pairs.length; i += 2) {
              checkSpace(8);
              [pairs[i], pairs[i + 1]].forEach((p, ci) => {
                if (!p) return;
                const x = MG + ci * colW;
                doc.setFont("helvetica", "bold");
                doc.setFontSize(7);
                doc.setTextColor(110, 116, 130);
                doc.text(p[0] + ":", x + 1, cy + 3);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(30, 32, 42);
                const val = doc.splitTextToSize(String(p[1] || "—"), colW - 4);
                doc.text(val[0], x + 1, cy + 6.8);
              });
              cy += 8.5;
            }
          };
          const fullLine = (label, val) => {
            const lines = doc.splitTextToSize(String(val || "—"), CW - 4);
            checkSpace(5 + lines.length * 4);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(7);
            doc.setTextColor(110, 116, 130);
            doc.text(label + ":", MG + 1, cy + 3);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(30, 32, 42);
            doc.text(lines, MG + 1, cy + 7);
            cy += 5 + lines.length * 4;
          };
          const totRow = (label, val) => {
            checkSpace(8);
            doc.setFillColor(1, 111, 34);
            doc.rect(MG, cy, CW, 7.5, "F");
            doc.setFont("helvetica", "bold");
            doc.setFontSize(9.5);
            doc.setTextColor(196, 255, 63);
            doc.text(label, MG + 5, cy + 5.2);
            doc.text(val, MG + CW - 2, cy + 5.2, { align: "right" });
            cy += 9;
          };

          drawTopBar();

          // 0. Classificação automática
          sec("CLASSIFICAÇÃO DO ATENDIMENTO");
          fullLine(
            "Formulário",
            fluxo === "mais3"
              ? "Análise de Rede / Aprovação de Projeto BT (APR Web)"
              : "Orçamento de Conexão até 3 caixas (sem disjuntor geral)",
          );
          if (classRes) fullLine("Critérios", classRes.motivos.join("; "));
          kvPairs([
            ["Qtd. de caixas de medição", classData?.nCaixas],
            ["Solicitação", classif.solicitacao],
          ]);
          cy += 2;

          // 1. Proprietário
          sec("1.  DADOS DO PROPRIETÁRIO");
          kvPairs([
            ["Nome Completo", prop.nome],
            ["CPF/CNPJ", prop.cpfCnpj],
            ["E-mail", prop.email],
            ["Celular", prop.celular],
            ["Telefone Fixo", prop.fixo],
            ["RG/RNE/RANI", prop.rg],
            ["Data Nasc.", prop.nasc],
            ["Filiação", prop.filiacao],
            ["Tel. Solicitante", prop.telSolic],
            ["Tel. Proprietário", prop.telProp],
            ["Laudo médico (equip. essenciais)", prop.laudoMedico],
            ["NIS Tarifa Social", prop.nis === "Sim" ? prop.numNis : "Não"],
          ]);
          cy += 2;

          // 2. Correspondência
          sec("2.  CORRESPONDÊNCIA E FATURA");
          kvPairs([
            ["Receber fatura por e-mail", corr.receberEmail],
            ["Vencimento desejado", corr.vencimento],
            ["Conta globalizada", corr.contaGlobal],
            ["", ""],
          ]);
          if (corr.receberEmail === "Não") {
            kvPairs([
              ["Rua/Av", corr.rua],
              ["Nº", corr.num],
              ["Bairro/Distrito", corr.bairro],
              ["Complemento", corr.compl],
              ["Município", corr.municipio],
              ["CEP", corr.cep],
              ["Estado", corr.estado],
              ["", ""],
            ]);
          }
          cy += 2;

          // 3. Obra
          sec("3.  DADOS DA OBRA (PADRÃO DE ENTRADA)");
          const obraPairs = [
            ["Endereço", obra.endereco],
            ["Nº", obra.num],
            ["Complemento", obra.compl],
            ["Bairro", obra.bairro],
            ["Cidade", obra.cidade],
            ["Estado", obra.estado],
            ["CEP", obra.cep],
            ["Localização", obra.localizacao],
            ["Instalação / UC", obra.instalacaoUC],
          ];
          if (fluxo === "mais3")
            obraPairs.push(["Nº ART/TRT de Projeto", obra.art]);
          obraPairs.push(
            [
              "Coordenadas",
              obra.coordenada || `${obra.latitude} ${obra.longitude}`.trim(),
            ],
            ["Padrão pronto p/ ligar?", obra.prontoLigar],
            ["Em APP?", obra.app],
            ["Reserva Legal?", obra.reservaLegal],
            ["Tipo de rede BT", obra.tipoRede],
            ["Distância < 30m da rede?", obra.distMenor30],
            ["Transformador próximo", obra.transformador],
          );
          kvPairs(obraPairs);
          if (obra.localizacao === "Rural") {
            kvPairs([
              ["Distrito/Comunidade", obra.distritoComunidade],
              ["Nome da propriedade", obra.nomePropriedade],
              ["Ponto de referência", obra.pontoRef],
              ["Inst. mais próxima", obra.instProxima],
            ]);
          }
          cy += 2;

          // 4. Classificação detalhada (quadro 4) — EXCLUSIVO do formulário coletivo (mais de 3 caixas)
          if (fluxo === "mais3") {
            sec("4.  CLASSIFICAÇÃO / DEMANDA DO ATENDIMENTO");
            kvPairs([
              ["Solicitação", classif.solicitacao],
              ["Escopo", classif.escopo],
              ["Nº total de UCs", classif.nTotalUcs],
              ["Nº de UCs", classif.nUcs],
              ["Disjuntor solicitado", classif.disjSolicitado],
              ["Disjuntor atual", classif.disjAtual],
              [
                "Demanda futura (kVA)",
                classif.demandaFutura || fmt2(demandaTotalGeral),
              ],
              ["Demanda atual (kVA)", classif.demandaAtual],
              ["Motor MONO > 15 CV", classif.motorMono ? "Sim" : "Não"],
              ["Motor TRI > 50 CV", classif.motorTri ? "Sim" : "Não"],
              ["Disjuntor geral condomínio", classif.disjGeralCond],
              ["Demanda condomínio (kVA)", classif.demandaCond],
            ]);
            cy += 2;
          }

          // 5. Unidades Consumidoras + cargas
          ucs.forEach((u, ui) => {
            sec(`5.${ui + 1}  UNIDADE CONSUMIDORA ${ui + 1}`);
            kvPairs([
              ["Solicitação", u.solicitacao],
              ["Atividade principal", u.atividade],
              ["Nº Predial", u.nPredial],
              ["Complemento", u.complemento],
              ["Caixa / Identificação", u.caixa],
              ["Ramo de atividade", u.ramo],
              ["Nº Instalação", u.instalacao],
              ["Mudança de local", u.mudancaLocal],
              ["Disjuntor De", u.disjDe],
              ["Disjuntor Para", u.disjPara],
            ]);
            // tabela de cargas desta UC
            const qtds = u.cargas?.qtds || [];
            const itensComCarga = CAT.map((c, i) => ({
              ...c,
              q: qtds[i] || 0,
            })).filter((x) => x.q > 0);
            if (itensComCarga.length) {
              checkSpace(6);
              doc.setFillColor(215, 218, 226);
              doc.rect(MG, cy, CW, 5.5, "F");
              doc.setFont("helvetica", "bold");
              doc.setFontSize(7);
              doc.setTextColor(90, 96, 115);
              doc.text("Equipamento", MG + 2, cy + 3.8);
              doc.text("Pot. (W)", MG + 95, cy + 3.8);
              doc.text("Qtd", MG + 125, cy + 3.8, { align: "center" });
              doc.text("Total (W)", MG + CW - 2, cy + 3.8, { align: "right" });
              cy += 5.5;
              let ri = 0;
              itensComCarga.forEach((it) => {
                checkSpace(5);
                doc.setFillColor(
                  ri % 2 ? 247 : 255,
                  ri % 2 ? 248 : 255,
                  ri % 2 ? 251 : 255,
                );
                doc.rect(MG, cy, CW, 5, "F");
                doc.setFont("helvetica", "normal");
                doc.setFontSize(7.5);
                doc.setTextColor(30, 32, 42);
                doc.text(it.n, MG + 2, cy + 3.5);
                doc.text(fmtW(it.w), MG + 95, cy + 3.5);
                doc.text(String(it.q), MG + 125, cy + 3.5, { align: "center" });
                doc.text(fmtW(it.q * it.w), MG + CW - 2, cy + 3.5, {
                  align: "right",
                });
                ri++;
                cy += 5;
              });
            }
            // motores
            const mots = u.cargas?.mots || [];
            mots
              .filter((m) => (m.q || 0) > 0)
              .forEach((m, mi) => {
                checkSpace(5);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(7.5);
                doc.setTextColor(60, 60, 70);
                doc.text(
                  `Motor ${m.fase === "mono" ? "Monofásico" : "Trifásico"} ${m.cv} CV (Cat. ${m.col?.replace("c", "")}) — Qtd: ${m.q}`,
                  MG + 2,
                  cy + 3.5,
                );
                cy += 5;
              });
            checkSpace(8);
            totRow(
              `Carga ${fmt2(u.cargas?._cargaKw || 0)} kW  |  Demanda`,
              `${fmt2(u.cargas?._demanda || 0)} kVA`,
            );
            if (u.cargas?._disjuntores?.length)
              fullLine(
                "Disjuntor sugerido (ND-5.1)",
                u.cargas._disjuntores.join("  ·  "),
              );
            if (u.disjEscolhido)
              fullLine("Disjuntor escolhido", u.disjEscolhido);
            cy += 2;
          });

          // 6. Disjuntores de prumada (fluxo mais3)
          if (fluxo === "mais3") {
            sec("6.  DISJUNTORES DE PAVIMENTO/BLOCO E PRUMADA");
            kvPairs([
              ["Disjuntor geral solicitado", classif.disjSolicitado],
              ["Disjuntor geral atual", classif.disjAtual],
              ["Disjuntor cond./incêndio", classif.disjGeralCond],
              ["Disj. antes do geral?", classif.disjAntes],
            ]);
            cy += 2;
          }

          // 7. Gerador de emergência (fluxo ate3)
          if (fluxo === "ate3") {
            sec("7.  GERADOR DE EMERGÊNCIA");
            const gpairs = [["Há gerador de emergência?", gerador.possui]];
            if (gerador.possui === "Sim") {
              gpairs.push(
                ["Potência (kVA)", gerador.potencia],
                ["Fonte/Combustível", gerador.fonte],
              );
            }
            kvPairs(gpairs);
            if (gerador.possui === "Sim" && gerador.descricao)
              fullLine("Descrição", gerador.descricao);
            cy += 2;
          }

          // Observações
          sec("OBSERVAÇÕES");
          fullLine("Obs.", obs || "—");
          cy += 4;

          // Demanda total geral
          totRow(
            "DEMANDA TOTAL DO ATENDIMENTO",
            `${fmt2(demandaTotalGeral)} kVA`,
          );
          cy += 4;

          // assinatura
          checkSpace(20);
          doc.setDrawColor(180, 180, 180);
          doc.line(MG + 30, cy + 8, MG + CW - 30, cy + 8);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(7.5);
          doc.setTextColor(90, 90, 90);
          doc.text(
            "Local e data / Assinatura do proprietário ou representante legal",
            PW / 2,
            cy + 12,
            { align: "center" },
          );

          addFooterNum();
          const nomeArq = (prop.nome || "formulario")
            .replace(/[^a-zA-Z0-9]/g, "_")
            .slice(0, 30);
          doc.save(`CEMIG_${fluxo}_${nomeArq}.pdf`);
        }, [
          fluxo,
          classData,
          classRes,
          prop,
          corr,
          obra,
          classif,
          ucs,
          gerador,
          obs,
          demandaTotalGeral,
        ]);

        // ============================================================
        // RENDER
        // ============================================================
        if (etapa === "classificador") {
          return (
            <div style={{ background: TH.bg, minHeight: "100vh" }}>
              <div style={{ background: TH.acD }} className="px-5 py-4">
                <h1 className="text-white font-extrabold text-lg">
                  Formulários CEMIG — Orçamento de Conexão BT
                </h1>
                <p style={{ color: "#9fc7ae" }} className="text-xs mt-0.5">
                  Preenchimento web unificado · ND-5.1 / ND-5.2 · REN ANEEL
                  1.000/2021
                </p>
              </div>
              <div className="max-w-3xl mx-auto p-4 md:p-6">
                <Classificador onConfirm={onConfirmClass} />
              </div>
            </div>
          );
        }

        const idx = abas.findIndex((a) => a.k === aba);
        const irProx = () => setAba(abas[Math.min(idx + 1, abas.length - 1)].k);
        const irAnt = () => setAba(abas[Math.max(idx - 1, 0)].k);

        return (
          <div style={{ background: TH.bg, minHeight: "100vh" }}>
            <div
              style={{ background: TH.acD }}
              className="px-5 py-4 sticky top-0 z-20"
            >
              <div className="max-w-5xl mx-auto flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <h1 className="text-white font-extrabold text-base md:text-lg">
                    Formulários CEMIG — Orçamento de Conexão BT
                  </h1>
                  <p style={{ color: "#9fc7ae" }} className="text-xs mt-0.5">
                    {fluxo === "mais3"
                      ? "Análise de Rede / Projeto BT (APR Web)"
                      : "Conexão até 3 caixas (sem disjuntor geral)"}
                  </p>
                </div>
                <div className="flex items-center gap-2">
                  <Badge color="#c4ff3f">{fmt2(demandaTotalGeral)} kVA</Badge>
                  <button
                    onClick={() => setEtapa("classificador")}
                    className="text-xs font-semibold rounded-lg px-3 py-2 cursor-pointer"
                    style={{
                      background: "rgba(255,255,255,.1)",
                      color: "#fff",
                    }}
                  >
                    ↻ Reclassificar
                  </button>
                </div>
              </div>
            </div>

            {/* abas */}
            <div
              style={{ background: TH.cd, borderBottom: `1px solid ${TH.bd}` }}
              className="px-3 sticky z-10"
            >
              <div className="max-w-5xl mx-auto flex gap-1 overflow-x-auto py-2">
                {abas.map((a, i) => {
                  const on = a.k === aba;
                  return (
                    <button
                      key={a.k}
                      onClick={() => setAba(a.k)}
                      className="text-xs font-semibold rounded-lg px-3 py-2 whitespace-nowrap cursor-pointer transition"

                          <Sel
                            value={u.atividade}
                            onChange={(e) =>
                              setUC(ui, { atividade: e.target.value })
                            }
                          >
                            <option>Residencial</option>
                            <option>Comercial</option>
                            <option>Industrial</option>
                            <option>Rural</option>
                          </Sel>
                        </Field>
                        <Field label="Ramo de atividade">
                          <Inp
                            value={u.ramo}
                            onChange={(e) =>
                              setUC(ui, { ramo: e.target.value })
                            }
                            placeholder="Se não residencial"
                          />
                        </Field>
                        {u.solicitacao === "Conexão Nova" ? (
                          <>
                            <Field label="Nº Predial" req>
                              <Inp
                                value={u.nPredial}
                                onChange={(e) =>
                                  setUC(ui, { nPredial: e.target.value })
                                }
                              />
                            </Field>
                            <Field label="Complemento" req={ucs.length > 1}>
                              <Inp
                                value={u.complemento}
                                onChange={(e) =>
                                  setUC(ui, { complemento: e.target.value })
                                }
                                placeholder="Ex: Apto 101, Casa 1, Lj1"
                              />
                            </Field>
                            <Field label="Caixa / Identificação">
                              <Inp
                                value={u.caixa}
                                onChange={(e) =>
                                  setUC(ui, { caixa: e.target.value })
                                }
                              />
                            </Field>
                          </>
                        ) : (
                          <>
                            <Field label="Nº Instalação / Medidor / Caixa" req>
                              <Inp
                                value={u.instalacao}
                                onChange={(e) =>
                                  setUC(ui, { instalacao: e.target.value })
                                }
                              />
                            </Field>
                            <Field label="Complemento" req={ucs.length > 1}>
                              <Inp
                                value={u.complemento}
                                onChange={(e) =>
                                  setUC(ui, { complemento: e.target.value })
                                }
                                placeholder="Ex: Apto 101, Casa 1, Lj1"
                              />
                            </Field>
                            <Field label="Necessária mudança de local?">
                              <Toggle
                                value={u.mudancaLocal}
                                onChange={(v) => setUC(ui, { mudancaLocal: v })}
                                options={[
                                  { v: "Sim", l: "Sim" },
                                  { v: "Não", l: "Não" },
                                ]}
                              />
                            </Field>
                            <Field label="Desligamento programado (corte p/ conserto)?">
                              <Toggle
                                value={u.desligamento}
                                onChange={(v) => setUC(ui, { desligamento: v })}
                                options={[
                                  { v: "Sim", l: "Sim" },
                                  { v: "Não", l: "Não" },
                                ]}
                              />
                            </Field>
                            <Field label="Disjuntor De">
                              <Inp
                                value={u.disjDe}
                                onChange={(e) =>
                                  setUC(ui, { disjDe: e.target.value })
                                }
                                placeholder="Ex: 1x40"
                              />
                            </Field>
                            <Field label="Disjuntor Para">
                              <Inp
                                value={u.disjPara}
                                onChange={(e) =>
                                  setUC(ui, { disjPara: e.target.value })
                                }
                                placeholder="Ex: 3x60"
                              />
                            </Field>
                          </>
                        )}
                      </div>
                      <div
                        className="rounded-lg p-3"
                        style={{
                          background: TH.bg,
                          border: `1px dashed ${TH.bd}`,
                        }}
                      >
                        <div
                          className="text-xs font-bold mb-2"
                          style={{ color: TH.acD }}
                        >
                          Relação de cargas e cálculo de demanda (ND-5.1)
                        </div>
                        <CalcDemanda
                          data={u.cargas}
                          onChange={(c) => setUC(ui, { cargas: c })}
                          redeMono={redeMono}
                        />
                        {u.cargas?._disjuntores?.length > 0 && (
                          <Field
                            label="Disjuntor escolhido para esta UC"
                            cl="mt-3"
                          >
                            <Sel
                              value={
                                u.disjEscolhido || u.cargas._disjuntores[0]
                              }
                              onChange={(e) =>
                                setUC(ui, { disjEscolhido: e.target.value })
                              }
                            >
                              {u.cargas._disjuntores.map((dj) => (
                                <option key={dj} value={dj}>
                                  {dj}
                                </option>
                              ))}
                            </Sel>
                          </Field>
                        )}
                      </div>
                    </Card>
                  ))}
                </div>
              )}

              {/* ABA DISJUNTORES PRUMADA (mais3) */}
              {aba === "disj" && fluxo === "mais3" && (
                <Card
                  title="Disjuntores de Pavimento/Bloco e Prumada"
                  sub="Informe os disjuntores gerais e de prumada da edificação coletiva."
                >
                  <div className="grid md:grid-cols-2 gap-3">
                    <Field label="Disjuntor geral solicitado">
                      <Inp
                        value={classif.disjSolicitado}
                        onChange={(e) =>
                          setClassif({
                            ...classif,
                            disjSolicitado: e.target.value,
                          })
                        }
                      />
                    </Field>
                    <Field label="Disjuntor geral atual">
                      <Inp
                        value={classif.disjAtual}
                        onChange={(e) =>
                          setClassif({ ...classif, disjAtual: e.target.value })
                        }
                      />
                    </Field>
                    <Field label="Disjuntor condomínio / combate a incêndio">
                      <Inp
                        value={classif.disjGeralCond}
                        onChange={(e) =>
                          setClassif({
                            ...classif,
                            disjGeralCond: e.target.value,
                          })
                        }
                      />
                    </Field>
                    <Field label="Disjuntor antes do geral?">
                      <Toggle
                        value={classif.disjAntes}
                        onChange={(v) =>
                          setClassif({ ...classif, disjAntes: v })
                        }
                        options={[
                          { v: "Sim", l: "Sim" },
                          { v: "Não", l: "Não" },
                        ]}
                      />
                    </Field>
                  </div>
                  <div
                    className="rounded-lg p-3 mt-3 text-xs"
                    style={{ background: TH.soft, color: TH.acD }}
                  >
                    Demanda total somada das UCs:{" "}
                    <b>{fmt2(demandaTotalGeral)} kVA</b>. Para demanda total
                    acima de 304 kVA com alteração no disjuntor geral, é exigida
                    aprovação de projeto elétrico (item l das orientações).
                  </div>
                </Card>
              )}

              {/* ABA GERADOR DE EMERGÊNCIA (ate3) */}
              {aba === "gerador" && fluxo === "ate3" && (
                <Card
                  title="Gerador de Emergência"
                  sub="Informe se a instalação possui gerador de emergência."
                >
                  <Field label="Há gerador de emergência?" req cl="mb-3">
                    <Toggle
                      value={gerador.possui}
                      onChange={(v) => setGerador({ ...gerador, possui: v })}
                      options={[
                        { v: "Sim", l: "Sim" },
                        { v: "Não", l: "Não" },
                      ]}
                    />
                  </Field>
                  {gerador.possui === "Sim" && (
                    <div className="grid md:grid-cols-2 gap-3">
                      <Field label="Potência do gerador (kVA)">
                        <Inp
                          value={gerador.potencia}
                          onChange={(e) =>
                            setGerador({ ...gerador, potencia: e.target.value })
                          }
                        />
                      </Field>
                      <Field label="Fonte / Combustível">
                        <Sel
                          value={gerador.fonte}
                          onChange={(e) =>
                            setGerador({ ...gerador, fonte: e.target.value })
                          }
                        >
                          <option value="">Selecione</option>
                          <option>Diesel</option>
                          <option>Gasolina</option>
                          <option>Gás (GLP/GNV)</option>
                          <option>Outro</option>
                        </Sel>
                      </Field>
                      <Field
                        label="Descrição / Observações do gerador"
                        cl="md:col-span-2"
                      >
                        <Inp
                          value={gerador.descricao}
                          onChange={(e) =>
                            setGerador({
                              ...gerador,
                              descricao: e.target.value,
                            })
                          }
                          placeholder="Modelo, finalidade, regime de operação..."
                        />
                      </Field>
                      <div
                        className="md:col-span-2 rounded-lg px-3 py-2 text-xs"
                        style={{ background: TH.soft, color: TH.acD }}
                      >
                        O gerador de emergência opera de forma isolada (sem
                        paralelismo com a rede CEMIG). Caso haja paralelismo ou
                        injeção, o atendimento deve ser tratado como Geração
                        Distribuída.
                      </div>
                    </div>
                  )}
                </Card>
              )}

              {/* ABA OBSERVAÇÕES */}
              {aba === "obs" && (
                <Card
                  title="Observações"
                  sub="Inclua aqui informações relevantes: GD já conectada, justificativa de disjuntor, atendimento híbrido, etc."
                >
                  <textarea
                    value={obs}
                    onChange={(e) => setObs(e.target.value)}
                    rows={6}
                    className="w-full rounded-lg text-sm outline-none"
                    style={{
                      background: TH.inp,
                      color: TH.tx,
                      border: `1px solid ${TH.bd}`,
                      padding: "10px",
                    }}
                  />
                </Card>
              )}

              {/* ABA REVISAR E PDF */}
              {aba === "revisar" && (
                <div>
                  <Card
                    title="Revisão Final"
                    sub="Confira o resumo antes de gerar o PDF."
                  >
                    <div className="grid md:grid-cols-2 gap-3 text-sm">
                      <div
                        className="rounded-lg p-3"
                        style={{ background: TH.soft }}
                      >
                        <div
                          className="text-xs font-bold mb-1"
                          style={{ color: TH.acD }}
                        >
                          Formulário
                        </div>
                        <div style={{ color: TH.tx }}>
                          {fluxo === "mais3"
                            ? "Análise de Rede / Projeto BT (APR Web)"
                            : "Conexão até 3 caixas (sem disjuntor geral)"}
                        </div>
                      </div>
                      <div
                        className="rounded-lg p-3"
                        style={{ background: TH.soft }}
                      >
                        <div
                          className="text-xs font-bold mb-1"
                          style={{ color: TH.acD }}
                        >
                          Proprietário
                        </div>
                        <div style={{ color: TH.tx }}>
                          {prop.nome || "—"} · {prop.cpfCnpj || "—"}
                        </div>
                      </div>
                      <div
                        className="rounded-lg p-3"
                        style={{ background: TH.soft }}
                      >
                        <div
                          className="text-xs font-bold mb-1"
                          style={{ color: TH.acD }}
                        >
                          Obra
                        </div>
                        <div style={{ color: TH.tx }}>
                          {obra.endereco || "—"}, {obra.num || "s/n"} —{" "}
                          {obra.cidade || "—"}/{obra.estado}
                        </div>
                      </div>
                      <div
                        className="rounded-lg p-3"
                        style={{ background: TH.acD }}
                      >
                        <div
                          className="text-xs font-bold mb-1"
                          style={{ color: TH.lime }}
                        >
                          Demanda Total
                        </div>
                        <div className="text-white font-extrabold text-lg">
                          {fmt2(demandaTotalGeral)} kVA
                        </div>
                      </div>
                    </div>
                    <div className="mt-3">
                      <div
                        className="text-xs font-bold mb-1"
                        style={{ color: TH.mt }}
                      >
                        Unidades Consumidoras ({ucs.length})
                      </div>
                      {ucs.map((u, ui) => (
                        <div
                          key={ui}
                          className="flex items-center justify-between py-1.5 text-sm"
                          style={{ borderTop: `1px solid ${TH.bd}` }}
                        >
                          <span style={{ color: TH.tx }}>
                            UC {ui + 1} · {u.atividade} · {u.solicitacao}
                          </span>
                          <span
                            style={{ color: TH.ac }}
                            className="font-semibold"
                          >
                            {fmt2(u.cargas?._demanda || 0)} kVA ·{" "}
                            {(u.cargas?._disjuntores || []).join(", ") || "—"}
                          </span>
                        </div>
                      ))}
                    </div>
                  </Card>
                  <Card sub="Lembre-se de anexar à solicitação: planta de situação (A4), ART/TRT de projeto e documentos de regularidade do imóvel conforme as orientações da CEMIG.">
                    <div className="flex gap-2 flex-wrap">
                      <Btn v="dark" onClick={gerarPDF}>
                        📄 Gerar PDF do formulário
                      </Btn>
                    </div>
                  </Card>
                </div>
              )}

              {/* NAVEGAÇÃO INFERIOR */}
              <div className="flex items-center justify-between gap-2 mt-2 pb-8">
                <Btn onClick={irAnt} disabled={idx === 0}>
                  ← Anterior
                </Btn>
                <span className="text-xs" style={{ color: TH.mt }}>
                  Etapa {idx + 1} de {abas.length}
                </span>
                {aba === "revisar" ? (
                  <Btn v="a" onClick={gerarPDF}>
                    📄 Gerar PDF
                  </Btn>
                ) : (
                  <Btn v="a" onClick={irProx}>
                    Próximo →
                  </Btn>
                )}
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
